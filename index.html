<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Personalizador 3D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/watermarkmodel/assets/index-aoJgv2z_.js"></script>
    <link rel="stylesheet" crossorigin href="/watermarkmodel/assets/index-tw12Ooe9.css">
  </head>

  <body>
    <button
      id="control-panel-toggle"
      class="panel-toggle"
      type="button"
      aria-controls="control-panel"
      aria-expanded="false"
    >
      Ajustes
    </button>
    <aside id="control-panel">
      <h1>Personalizador</h1>

      <label class="field">
        <span>Nombre</span>
        <input type="text" id="control-nombre" maxlength="20" value="JUGADOR" />
      </label>

      <label class="field">
        <span>Número</span>
        <input type="number" id="control-numero" maxlength="2" value="10" />
      </label>

      <fieldset class="field">
        <legend>Modelo</legend>
        <label
          ><input type="radio" name="modelo-torso" value="./ModeloMasc.glb" checked />
          Torso A</label
        >
        <label><input type="radio" name="modelo-torso" value="./ModeloFem.glb" />
          Torso B</label>
      </fieldset>

      <fieldset class="field">
        <legend>Patrones Base</legend>
        <label
          ><input
            type="radio"
            name="textura-base"
            value="./pattern1.svg"
            checked
          />
          Cintas</label
        >
        <label
          ><input type="radio" name="textura-base" value="./pattern2.svg" />
          Líneas</label
        >
        <label
          ><input type="radio" name="textura-base" value="./pattern3.svg" />
          Curvas</label
        >
        <label
          ><input type="radio" name="textura-base" value="./pattern4.svg" />
          Hexágonos</label
        >
        <label
          ><input type="radio" name="textura-base" value="./pattern5.svg" />
          Ninguno</label
        >
      </fieldset>

      <fieldset class="field">
        <legend>Nombre y número</legend>
        <label
          ><input type="radio" name="modo-pivotes" value="espalda" checked />
          Espalda</label
        >
        <label
          ><input type="radio" name="modo-pivotes" value="espalda_manga" />
          Espalda + Manga</label
        >
        <label
          ><input type="radio" name="modo-pivotes" value="espalda_frente" />
          Espalda + Abdomen</label
        >
        <label
          ><input
            type="radio"
            name="modo-pivotes"
            value="espalda_frente_manga"
          />
          Espalda + Manga + Abdomen</label
        >
      </fieldset>

      <fieldset class="field">
        <legend>Paletas Disponibles</legend>
        <div id="control-paletas" class="palette-list"></div>
      </fieldset>

      <label class="field hidden">
        <span>Color Contorno</span>
        <input type="color" id="control-color-outline" value="#ffffff" />
      </label>

      <div class="actions">
        <button id="control-capturar" class="buttonLeft" type="button">
          Video Vertical
        </button>
        <button id="control-story" class="buttonRight" type="button">
          Video Horizontal
        </button>
      </div>
    </aside>
    <div
      id="canvas-loader"
      class="canvas-loader"
      role="status"
      aria-live="polite"
      aria-label="Cargando"
    >
      <div id="loader-lottie" class="loader-lottie" aria-hidden="true"></div>
      <div class="loader-mark" aria-hidden="true"></div>
      <span>Cargando</span>
      <div class="loader-actions" hidden>
        <button id="video-share" type="button">Compartir</button>
        <button id="video-download" type="button">Descargar</button>
        <button id="video-close" type="button">Cerrar</button>
      </div>
    </div>
    <div id="app"></div>
  </body>
</html>
